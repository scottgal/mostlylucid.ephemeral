name: Publish NuGet Packages

on:
  push:
    tags:
      - 'v*.*.*'                    # e.g., v1.0.0 or v1.0.0-preview

defaults:
  run:
    working-directory: mostlylucid.ephemeral

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for NuGet OIDC trusted publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            6.0.x
            7.0.x
            8.0.x
            9.0.x
            10.0.x

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing version: ${VERSION}"

      - name: Restore solution
        run: dotnet restore mostlylucid.ephemeral.sln

      - name: Build solution
        run: dotnet build mostlylucid.ephemeral.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test mostlylucid.ephemeral.sln --configuration Release --no-build --verbosity normal

      # Notify package lives in a sibling tree (mostlylucid.notify/) and ships from the
      # same tag. cd up to repo root for the restore/build/test.
      - name: Build + test notify tree
        run: |
          cd ..
          dotnet restore mostlylucid.notify/Mostlylucid.Notify.slnx
          dotnet build   mostlylucid.notify/Mostlylucid.Notify.slnx --configuration Release --no-restore
          dotnet test    mostlylucid.notify/Mostlylucid.Notify.slnx --configuration Release --no-build --verbosity normal

      - name: Pack all packages
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p ./nupkg

          # Core package
          dotnet pack src/mostlylucid.ephemeral/mostlylucid.ephemeral.csproj \
            --configuration Release --no-build \
            -p:PackageVersion=$VERSION \
            --output ./nupkg

          # Atom packages
          for proj in src/mostlylucid.ephemeral.atoms.*/*.csproj; do
            dotnet pack "$proj" --configuration Release --no-build \
              -p:PackageVersion=$VERSION \
              --output ./nupkg
          done

          # Pattern packages
          for proj in src/mostlylucid.ephemeral.patterns.*/*.csproj; do
            dotnet pack "$proj" --configuration Release --no-build \
              -p:PackageVersion=$VERSION \
              --output ./nupkg
          done

          # SQLite demo
          dotnet pack src/mostlylucid.ephemeral.sqlite.singlewriter/mostlylucid.ephemeral.sqlite.singlewriter.csproj \
            --configuration Release --no-build \
            -p:PackageVersion=$VERSION \
            --output ./nupkg

          # Complete bundle
          dotnet pack src/mostlylucid.ephemeral.complete/mostlylucid.ephemeral.complete.csproj \
            --configuration Release --no-build \
            -p:PackageVersion=$VERSION \
            --output ./nupkg

          # Atoms.Ephemeral (LLM coordinator) - versioned aligned with the family (tag)
          dotnet pack src/Mostlylucid.Atoms.Ephemeral/Mostlylucid.Atoms.Ephemeral.csproj \
            --configuration Release --no-build \
            -p:PackageVersion=$VERSION \
            --output ./nupkg

      # Notify package(s) pack from the sibling tree at repo root. Pack output drops
      # into the same ./nupkg directory inside mostlylucid.ephemeral/ so the existing
      # push step picks them up.
      #
      # IMPORTANT: Notify versions independently of the ephemeral tree -- the csproj's
      # <Version> wins, NOT the tag. The atoms.smtp + ephemeral packages ride the tag;
      # Notify ships at its own pace (v0.1.0 first publish, bump per its own changes).
      - name: Pack notify packages
        run: |
          cd ..
          for proj in mostlylucid.notify/src/Mostlylucid.Notify*/Mostlylucid.Notify*.csproj; do
            dotnet pack "$proj" --configuration Release --no-build \
              --output mostlylucid.ephemeral/nupkg
          done

      - name: List packages
        run: ls -la ./nupkg/

      # Exchange the GitHub OIDC token for a short-lived nuget.org API key.
      # The nuget.org account "mostlylucid" must have a Trusted Publisher policy
      # registered for this repo + workflow file. No long-lived secret needed.
      - name: NuGet login (OIDC trusted publishing)
        id: nuget-login
        uses: NuGet/login@v1
        with:
          user: mostlylucid

      - name: Push to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key "${{ steps.nuget-login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate
